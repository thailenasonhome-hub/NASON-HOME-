<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NASON HOME — Hệ thống Lương &amp; Nhân sự</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--t:#0F6E56;--t2:#185FA5;--td:#0a4d41;--pk:#e05a8a;--bl:#2d6ab4;--gd:#b8780a;
--g50:#f9fafb;--g100:#f3f4f6;--g200:#e5e7eb;--g300:#d1d5db;--g500:#6b7280;--g700:#374151;--g900:#111827;
--ok:#15803d;--okbg:#dcfce7;--warn:#b45309;--warnbg:#fef3c7;--err:#b91c1c;--errbg:#fee2e2;--r:10px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Noto Sans JP','Hiragino Sans',sans-serif;background:var(--g100);color:var(--g900);font-size:13px}
/* lock */
#lock{position:fixed;inset:0;background:#f0f4f8;display:flex;align-items:center;justify-content:center;z-index:9999}
.lockbox{background:#fff;border-radius:16px;padding:34px 30px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.12);width:300px}
.lockbox h1{font-size:17px;color:var(--t);margin:8px 0 2px}
.lockbox p{font-size:12px;color:var(--g500);margin-bottom:18px}
.lockbox input{width:100%;padding:10px;border:1.5px solid var(--g200);border-radius:9px;font-size:16px;text-align:center;letter-spacing:3px;margin-bottom:10px;outline:none}
.lockbox input:focus{border-color:var(--t)}
.lockbox button{width:100%;padding:11px;background:linear-gradient(135deg,var(--t),var(--t2));color:#fff;border:0;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer}
.lockerr{color:var(--err);font-size:12px;margin-top:8px;display:none}
.tiles{display:flex;gap:5px;justify-content:center}
.tile{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;font-style:italic;color:#fff;font-family:Georgia,serif}
.tn{background:linear-gradient(135deg,#00C9A7,#0099CC)}.ts{background:linear-gradient(135deg,#FF9EC4,#FF6B9D)}.th{background:linear-gradient(135deg,#00BFFF,#0066FF)}
/* layout */
#app{display:none;flex-direction:column;min-height:100vh}
header{background:linear-gradient(135deg,var(--t),var(--t2));color:#fff;position:sticky;top:0;z-index:50;box-shadow:0 2px 10px rgba(0,0,0,.15)}
.htop{display:flex;align-items:center;gap:10px;padding:9px 14px 0;flex-wrap:wrap}
.htop .nm{font-size:15px;font-weight:700;letter-spacing:.4px}
.htop .nm small{display:block;font-size:9px;font-weight:500;color:rgba(255,255,255,.6)}
.period{margin-left:auto;display:flex;align-items:center;gap:6px}
.period select,.period input{font-family:inherit;font-size:12px;padding:4px 8px;border-radius:7px;border:0;background:rgba(255,255,255,.16);color:#fff}
.period select option{color:#000}
.period .seg{display:flex;background:rgba(255,255,255,.14);border-radius:7px;overflow:hidden}
.period .seg button{font-family:inherit;font-size:11px;font-weight:600;color:rgba(255,255,255,.8);background:transparent;border:0;padding:5px 11px;cursor:pointer}
.period .seg button.on{background:#fff;color:var(--t)}
.tabs{display:flex;gap:4px;padding:8px 14px;overflow-x:auto}
.tabs::-webkit-scrollbar{height:5px}.tabs::-webkit-scrollbar-thumb{background:rgba(255,255,255,.3);border-radius:3px}
.tabs button{flex:0 0 auto;font-family:inherit;font-size:12px;font-weight:600;color:#E1F5EE;background:rgba(255,255,255,.12);border:0;padding:7px 12px;border-radius:8px;white-space:nowrap;cursor:pointer;display:inline-flex;gap:5px;align-items:center}
.tabs button:hover{background:rgba(255,255,255,.24);color:#fff}
.tabs button.on{background:#fff;color:var(--t)}
main{flex:1;padding:16px 14px;max-width:1180px;margin:0 auto;width:100%}
section.tab{display:none}section.tab.on{display:block}
h2.th{font-size:16px;color:var(--g900);margin-bottom:3px}
.sub{font-size:11px;color:var(--g500);margin-bottom:14px}
/* cards / grid */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(165px,1fr));gap:10px;margin-bottom:16px}
.kpi{background:#fff;border:.5px solid var(--g200);border-radius:var(--r);padding:13px 15px}
.kpi .l{font-size:10.5px;color:var(--g500);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.kpi .v{font-size:20px;font-weight:800;color:var(--t);margin-top:3px}
.kpi .v.neg{color:var(--err)}.kpi .v.pos{color:var(--ok)}
.kpi small{font-size:10px;color:var(--g500)}
.panel{background:#fff;border:.5px solid var(--g200);border-radius:var(--r);padding:16px;margin-bottom:14px}
.panel>h3{font-size:13px;color:var(--g900);margin-bottom:10px;display:flex;align-items:center;gap:7px;justify-content:space-between}
.panel>h3 .ti{display:flex;align-items:center;gap:7px}
/* form */
.frm{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.fld label{display:block;font-size:10.5px;font-weight:600;color:var(--g500);margin-bottom:3px}
.fld input,.fld select{width:100%;padding:8px 10px;border:1px solid var(--g200);border-radius:8px;font-size:13px;font-family:inherit;outline:none}
.fld input:focus,.fld select:focus{border-color:var(--t)}
.fld input[readonly]{background:var(--g50);color:var(--g700)}
.hint{font-size:10px;color:var(--g500);margin-top:2px}
.btn{font-family:inherit;font-size:12.5px;font-weight:600;border:0;border-radius:8px;padding:8px 16px;cursor:pointer;background:var(--t);color:#fff}
.btn:hover{filter:brightness(1.07)}
.btn.sec{background:var(--g100);color:var(--g700);border:1px solid var(--g200)}
.btn.sm{padding:5px 10px;font-size:11px}
.btn.dg{background:var(--errbg);color:var(--err)}
.btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
/* table */
.tw{overflow-x:auto}
table.tb{width:100%;border-collapse:collapse;font-size:12px}
table.tb th{background:var(--g50);text-align:left;padding:8px 10px;font-weight:700;color:var(--g700);border-bottom:1.5px solid var(--g200);white-space:nowrap;font-size:11px}
table.tb td{padding:7px 10px;border-bottom:1px solid var(--g100);vertical-align:middle}
table.tb tr:hover td{background:#fafdfc}
.yen{font-variant-numeric:tabular-nums;white-space:nowrap}
.tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
.tag.l1{background:#eef2ff;color:#3730a3}.tag.l2{background:#ecfeff;color:#155e75}.tag.l3{background:#f0fdf4;color:#166534}
.tag.l4{background:#fff7ed;color:#9a3412}.tag.l5{background:#fdf2f8;color:#9d174d}
.tag.ok{background:var(--okbg);color:var(--ok)}.tag.no{background:var(--errbg);color:var(--err)}.tag.wn{background:var(--warnbg);color:var(--warn)}
.note{background:#f0f9f6;border-left:3px solid var(--t);border-radius:6px;padding:9px 12px;font-size:11.5px;color:var(--g700);margin:10px 0;line-height:1.55}
.note.w{background:var(--warnbg);border-color:var(--warn)}
.empty{text-align:center;color:var(--g500);padding:24px;font-size:12px}
.co{font-size:10px;color:var(--g500);line-height:1.5;border-top:1px solid var(--g200);margin-top:14px;padding-top:10px}
.flow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;font-size:12px}
.flowbox{background:var(--g50);border:1px solid var(--g200);border-radius:8px;padding:6px 10px}
.bar{height:8px;background:var(--g100);border-radius:5px;overflow:hidden;margin-top:4px}
.bar>i{display:block;height:100%;background:var(--t)}
.chat{height:300px;overflow-y:auto;background:var(--g50);border-radius:8px;padding:12px;margin-bottom:10px}
.msg{margin-bottom:10px;font-size:12.5px;line-height:1.6}
.msg.u{text-align:right}.msg.u b{background:var(--t);color:#fff;padding:7px 11px;border-radius:12px 12px 2px 12px;display:inline-block;font-weight:400}
.msg.a b{background:#fff;border:1px solid var(--g200);padding:8px 12px;border-radius:12px 12px 12px 2px;display:inline-block;font-weight:400;text-align:left;white-space:pre-wrap}
.ev{border:1px solid var(--g200);border-radius:9px;padding:11px 13px;margin-bottom:9px}
.ev .h{display:flex;justify-content:space-between;align-items:center;gap:8px;flex-wrap:wrap}
.cond{font-size:11.5px;margin:3px 0;display:flex;gap:6px;align-items:flex-start}
.rankcard{border:1px solid var(--g200);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.rankcard h4{font-size:13px;color:var(--t);margin-bottom:5px}
.rankcard ul{margin:4px 0 4px 16px;font-size:11.5px;line-height:1.6}
@media print{header,.tabs,.period,.btnrow,.noprint{display:none!important}body{background:#fff}main{max-width:none}}

/* ===== PHIẾU LƯƠNG NHẬT (給与明細書) ===== */
.ps-doc{max-width:720px;margin:0 auto;background:#fff}
.ps-hd{background:linear-gradient(135deg,#0A3D35,#0F6E56 60%,#185FA5);color:#fff;padding:12px 16px;border-radius:8px 8px 0 0}
.ps-hdtb{width:100%}.ps-logo img{vertical-align:middle}
.ps-co{font-size:10px;line-height:1.6;opacity:.93;margin-top:6px}
.ps-title{font-size:18px;font-weight:800;margin:10px 0 6px;color:#0A3D35}
.ps-meta{font-size:11px;color:#55665f;margin:0 0 8px;padding:5px 2px;border-bottom:1px dashed #cdd8d4}
.ps-info{width:100%;border-collapse:collapse;margin-bottom:8px}
.ps-info td{border:1px solid #cdd8d4;padding:5px 8px;font-size:12px}
.ps-tb{width:100%;border-collapse:collapse}
.ps-tb td{border:1px solid #cdd8d4;padding:4px 6px;font-size:12px}
.ps-tb .psL,.ps-info .psL{background:#eef2f1;color:#33403b;font-size:11px;white-space:nowrap;text-align:center}
.ps-tb .psSec{background:linear-gradient(90deg,#0F6E56,#185FA5);color:#fff;font-weight:700;text-align:left;padding:5px 10px;font-size:12px}
.ps-tb .psV{text-align:right}
.ps-tb .psV input{width:100%;box-sizing:border-box;border:1px solid #d6e0dc;border-radius:5px;padding:3px 6px;text-align:right;font-size:12px;font-family:inherit}
.ps-tb .calc{background:#fff7e0;font-weight:700}
.ps-tb .psTot{background:#dff0e9;font-weight:700}
.ps-tb .psE{background:#fafbfb}
#ps-print{display:none}
@media print{ body.pps>*{display:none!important} body.pps #ps-print{display:block!important;padding:8px} body.pps #ps-print .ps-doc{max-width:none} }

/* ===== NASON KUN AI ===== */
.nason-tabs{display:flex;gap:8px;margin:10px 0}
.nason-vt{padding:8px 16px;border:1px solid var(--g200);background:#fff;border-radius:10px;cursor:pointer;font-weight:600;font-size:13px}
.nason-vt.on{background:linear-gradient(135deg,#0F6E56,#185FA5);color:#fff;border-color:transparent}
.nason-chat{display:flex;flex-direction:column}
.nason-hd{display:flex;align-items:center;gap:12px;padding-bottom:12px;border-bottom:1px solid var(--g100);margin-bottom:10px}
.nason-av{width:50px;height:50px;border-radius:50%;object-fit:cover;background:#eef7f4;border:2px solid #0F6E56}
.nason-name{font-weight:800;font-size:15px}
.nason-on{font-size:11px;color:#16a34a;font-weight:600}
.nason-sub{font-size:12px;color:var(--g500)}
.nason-msgs{min-height:300px;max-height:480px;overflow-y:auto;padding:8px 4px;display:flex;flex-direction:column;gap:12px}
.nason-row{display:flex;gap:8px;align-items:flex-end}
.nason-row.user{justify-content:flex-end}
.nason-mav{width:30px;height:30px;border-radius:50%;object-fit:cover;flex:0 0 auto}
.nason-bub{max-width:80%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.65;font-family:'Noto Sans JP','Segoe UI',system-ui,sans-serif}
.nason-bub.bot{background:#f3f7f5;border:1px solid #e3ece8;border-bottom-left-radius:4px;color:#1c2a26}
.nason-bub.user{background:linear-gradient(135deg,#0F6E56,#185FA5);color:#fff;border-bottom-right-radius:4px}
.nason-bub p{margin:6px 0}.nason-bub p:first-child{margin-top:0}.nason-bub p:last-child{margin-bottom:0}
.nason-bub h3,.nason-bub h4,.nason-bub h5{margin:10px 0 6px;font-size:15px}
.nason-bub ul,.nason-bub ol{margin:6px 0;padding-left:20px}.nason-bub li{margin:3px 0}
.nason-bub code{background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px;font-size:.9em}
.nason-bub.user code{background:rgba(255,255,255,.22)}
.nason-bub pre{background:#0d1117;color:#e6edf3;padding:10px;border-radius:8px;overflow-x:auto;font-size:12px}
.nason-bub pre code{background:none;padding:0}
.nason-bub blockquote{border-left:3px solid #0F6E56;margin:6px 0;padding:2px 10px;color:#445;background:#eef7f4}
.nason-bub table.md-tb,.nason-anout table.md-tb{border-collapse:collapse;margin:6px 0;font-size:13px;width:100%}
.nason-bub table.md-tb th,.nason-bub table.md-tb td,.nason-anout table.md-tb th,.nason-anout table.md-tb td{border:1px solid #cdd8d4;padding:5px 8px}
.nason-bub table.md-tb th,.nason-anout table.md-tb th{background:#eef2f1}
.nason-quick{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.nason-chip{padding:6px 12px;border:1px solid #cdd8d4;background:#fff;border-radius:18px;font-size:12px;cursor:pointer;color:#33403b}
.nason-chip:hover{background:#eef7f4;border-color:#0F6E56}
.nason-chip.on{background:linear-gradient(135deg,#0F6E56,#185FA5);color:#fff;border-color:transparent}
.nason-inrow{display:flex;gap:8px;align-items:flex-end;margin-top:6px}
.nason-inrow textarea{flex:1;resize:none;border:1px solid var(--g200);border-radius:12px;padding:10px 14px;font-size:14px;font-family:inherit;max-height:120px;line-height:1.5}
.nason-send{border-radius:50%;width:42px;height:42px;flex:0 0 auto;font-size:16px;padding:0;display:flex;align-items:center;justify-content:center}
.nason-dots{display:inline-flex;gap:4px}
.nason-dots i{width:7px;height:7px;border-radius:50%;background:#0F6E56;display:inline-block;animation:nasonBlink 1.2s infinite}
.nason-dots i:nth-child(2){animation-delay:.2s}.nason-dots i:nth-child(3){animation-delay:.4s}
@keyframes nasonBlink{0%,60%,100%{opacity:.3}30%{opacity:1}}
.nason-angles{display:flex;flex-wrap:wrap;gap:6px;margin:10px 0}
.nason-anout{margin-top:12px;font-size:14px;line-height:1.7;font-family:'Noto Sans JP','Segoe UI',sans-serif}
.nason-anout h2,.nason-anout h3{margin:14px 0 6px;color:#0a4d41}
.nason-anout ul,.nason-anout ol{padding-left:22px}.nason-anout li{margin:4px 0}
.nason-anhint{color:var(--g500);font-size:13px;padding:16px;text-align:center;background:#f9fafb;border-radius:10px}
</style>
</head>
<body>

<!-- LOCK -->
<div id="lock">
  <div class="lockbox">
    <div class="tiles"><div class="tile tn">n</div><div class="tile ts">s</div><div class="tile th">h</div></div>
    <h1>NASON HOME</h1>

<!-- APP -->

/* ============================================================

/* ---- Cấp bậc theo PDF HeSoNhanSu_v2 (trung thực, không chỉnh sửa) ---- */
const RANKS={
  L1:{code:'L1',vn:'Nhân viên kinh doanh',jp:'営業担当',en:'Sales staff',comm:50,grp:'—'},
  L2:{code:'L2',vn:'Trưởng nhóm',jp:'チームリーダー',en:'Team leader',comm:60,grp:'+5% GD nhóm'},
  L3:{code:'L3',vn:'Quản lý',jp:'マネージャー',en:'Manager',comm:65,grp:'+% lợi nhuận'},
  L4:{code:'L4',vn:'Trưởng phòng',jp:'課長 (Kachō)',en:'Section Chief (Kachō)',comm:70,grp:'+% lợi nhuận'},

/* ---------- helpers ---------- */
function yen(n){n=Math.round(n||0);return '¥'+n.toLocaleString('ja-JP');}
function pct(n){return (n||0)+'%';}
function inPeriod(dateStr){ // dateStr = YYYY-MM-DD
  if(!dateStr)return false;
  if(VIEW.period==='day')return dateStr===VIEW.month+'-'+(new Date().getDate().toString().padStart(2,'0')) || dateStr.slice(0,7)===VIEW.month; // day view falls back to selected month days
  if(VIEW.period==='year')return dateStr.slice(0,4)===VIEW.month.slice(0,4);
  return dateStr.slice(0,7)===VIEW.month; // month
}
function periodDeals(){return S.deals.filter(d=>inPeriod(d.date));}
function staffById(id){return S.staff.find(s=>s.id===id);}
function commPctOf(staff){return staff?(RK(staff.rank)?RK(staff.rank).comm:0):0;}
function avg3(s){var a=s.sales3||[];if(!a.length)return 0;return Math.round(a.reduce((x,y)=>x+y,0)/a.length);}
/* Doanh số sau khấu trừ = (売上 sales) - (広告料 ad). 仲介手数料 broker là phí công ty thu (¥). */
function dealSales(d){return (d.broker||0)+(d.ad||0);}    // 売上 = 仲介手数料 + 広告料
function dealNet(d){var tr=(typeof d.taxPct==='number')?d.taxPct:((S&&S.cfg&&typeof S.cfg.taxRate==='number')?S.cfg.taxRate:10);return Math.round(dealSales(d)*(1-tr/100));} // doanh số tính HH = 売上 − thuế%(theo từng deal, mặc định cấu hình/10%)
function dealComm(d){var s=staffById(d.staffId);var p=commPctOf(s);return Math.round(dealNet(d)*p/100);} // thực lãnh NV từ deal
function uid(p){return p+Math.random().toString(36).slice(2,8);}

/* ---------- AGGREGATES (real-time) ---------- */
/* ===== P2: scope theo kỳ cho khấu trừ + liên kết mục tiêu <-> thăng cấp ===== */
function periodMonths(){if(VIEW.period==='year'){var y=VIEW.month.slice(0,4);var a=[];for(var m=1;m<=12;m++)a.push(y+'-'+String(m).padStart(2,'0'));return a;}return [VIEW.month];}
function deductSumOverPeriod(id,field){var r=(S.deduct||{})[id]||{};return periodMonths().reduce(function(x,mk){var mm=r[mk];return x+(+((mm&&mm[field])||0));},0);}
function last3MonthKeys(){var base=new Date(VIEW.month+'-01T00:00:00');var a=[];for(var i=0;i<3;i++){var dt=new Date(base.getFullYear(),base.getMonth()-i,1);a.push(dt.getFullYear()+'-'+String(dt.getMonth()+1).padStart(2,'0'));}return a;}
function monthRevenueActual(mk){return (S.deals||[]).filter(function(d){return isDone(d)&&(d.date||'').slice(0,7)===mk;}).reduce(function(x,d){return x+dealSales(d);},0);}
function staffMonthSales(id,mk){return (S.deals||[]).filter(function(d){return isDone(d)&&d.staffId===id&&(d.date||'').slice(0,7)===mk;}).reduce(function(x,d){return x+dealSales(d);},0);}
function companyHit3m(){var T=(S.coTargets&&S.coTargets.month&&+S.coTargets.month.revenue)||0;if(T<=0)return false;return last3MonthKeys().every(function(k){return monthRevenueActual(k)>=T;});}
function staffHit3m(s){var t=staffTarget(s.id).sales;if(t<=0)return false;return last3MonthKeys().every(function(k){return staffMonthSales(s.id,k)>=t;});}
function agg(){
  const ds=periodDeals().filter(isDone); // CHỈ deal 契約完了 mới vào doanh số/lương
  let sales=0,broker=0,ad=0,taxed=0,salary=0;
  ds.forEach(d=>{sales+=dealSales(d);broker+=(d.broker||0);ad+=(d.ad||0);taxed+=dealNet(d);salary+=dealComm(d);});
  const expense=S.expenses.filter(e=>inPeriod(expDate(e))).reduce((x,e)=>x+(e.amount||0),0);
  let bonus=0;(S.staff||[]).forEach(s=>{bonus+=deductSumOverPeriod(s.id,'bonus');}); // thưởng doanh số (ra) — theo kỳ (scope)
  let kotsu=0;(S.staff||[]).forEach(s=>{kotsu+=deductSumOverPeriod(s.id,'kotsu');}); // 交通費 (ra, cộng) — theo kỳ (scope)
  let ded=0;(S.staff||[]).forEach(s=>{ded+=deductSumOverPeriod(s.id,'bhxh')+deductSumOverPeriod(s.id,'bhtn')+deductSumOverPeriod(s.id,'tax')+deductSumOverPeriod(s.id,'other');}); // khấu trừ (theo kỳ)
  const tax=sales-taxed; // thuế tiêu dùng 10%
  const profitBefore=taxed-salary-bonus-kotsu; // (売上−10%) − lương − thưởng − 交通費
  const profitAfter=profitBefore-expense; // sau khi trừ chi phí vận hành
  return {count:ds.length,sales,broker,ad,taxed,tax,salary,bonus,kotsu,ded,expense,profitBefore,profitAfter};
}

  if(a.profitAfter<0)return L({vi:'⚠️ Dòng tiền ÂM '+yen(-a.profitAfter)+': phí môi giới thu vào ('+yen(a.broker)+') không đủ bù lương + chi phí. Cần tăng số giao dịch hoặc cắt giảm chi phí cố định.',jp:'⚠️ キャッシュフロー赤字 '+yen(-a.profitAfter)+'：仲介手数料収入（'+yen(a.broker)+'）が給与＋経費を賄えません。取引数の増加または固定費の削減が必要です。',en:'⚠️ Negative cash flow '+yen(-a.profitAfter)+': brokerage income ('+yen(a.broker)+') does not cover salary + expenses. Increase deals or cut fixed costs.'});
  const margin=a.broker?Math.round(a.profitAfter/a.broker*100):0;const thin=margin<20;
  return L({vi:'Biên lãi ròng/phí môi giới ≈ '+margin+'%. '+(thin?'Biên mỏng — soát lại chi phí cố định (tiền nhà, Athome).':'Biên ổn — có thể tái đầu tư marketing/tuyển dụng.'),jp:'純利益/仲介手数料 ≈ '+margin+'%。'+(thin?'薄利 — 固定費（家賃・Athome）を見直してください。':'安定 — マーケティング/採用へ再投資可能。'),en:'Net margin / brokerage ≈ '+margin+'%. '+(thin?'Thin — review fixed costs (rent, Athome).':'Healthy — can reinvest in marketing/hiring.')});

function assess(a){
  let out=[];

  if(a.expense>a.broker*0.5&&a.broker>0)out.push(L({vi:'Chi phí cố định chiếm >50% phí môi giới → rà soát Athome/điện thoại/tiền nhà.',jp:'固定費が仲介手数料の50%超 → Athome/電話/家賃を見直し。',en:'Fixed costs exceed 50% of brokerage → review Athome/phone/rent.'}));
  if(a.salary>a.broker)out.push(L({vi:'Lương NV vượt phí môi giới thu vào → kiểm tra cơ cấu % hoa hồng vs nguồn thu.',jp:'給与が仲介手数料収入を超過 → 歩合率と収入構造を確認。',en:'Payroll exceeds brokerage income → review commission % vs revenue.'}));
  if(a.profitAfter>0&&a.count>0)out.push(L({vi:'Lãi dương — cân nhắc thưởng giữ chân nhân sự giỏi & tăng ngân sách tuyển dụng.',jp:'黒字 — 優秀人材の引き留め賞与・採用予算増を検討。',en:'Profitable — consider retention bonuses & a larger hiring budget.'}));
  if(!out.length)out.push(L({vi:'Tình hình ổn định.',jp:'状況は安定しています。',en:'Situation is stable.'}));
  return out.map(x=>`<div class="cond">▸ ${x}</div>`).join('');
}

function dealPreview(){
  const s=staffById(d_('dStaff').value);const p=commPctOf(s);
  const broker=+d_('dBroker').value||0,ad=+d_('dAd').value||0;
  var _tx=(d_('dTax')?(d_('dTax').value||''):'').trim();var tr=(_tx==='')?NaN:+_tx;if(isNaN(tr)||tr<0||tr>100)tr=(S&&S.cfg&&typeof S.cfg.taxRate==='number')?S.cfg.taxRate:10;
  const sales=broker+ad;const net=Math.round(sales*(1-tr/100));
  d_('dSales').value=yen(sales);
  d_('dNet').value=yen(net);d_('dEarn').value=yen(Math.round(net*p/100));

/* ----- BẢNG LƯƠNG ----- */
function payrollRows(){
  return S.staff.map(s=>{
    const ds=periodDeals().filter(d=>d.staffId===s.id&&isDone(d));
    const gross=ds.reduce((x,d)=>x+dealSales(d),0); // Tổng doanh số 売上
    const net=ds.reduce((x,d)=>x+dealNet(d),0);   // tổng doanh số sau khấu trừ
    const p=commPctOf(s);
    const pay=ds.reduce((x,d)=>x+dealComm(d),0);  // Tổng thực lãnh = Σ hoa hồng từng deal (đồng nhất toàn hệ thống)
    const dd=staffDeduct(s.id);const ded=(+dd.bhxh||0)+(+dd.bhtn||0)+(+dd.tax||0)+(+dd.other||0);const take=pay-ded;
    const bonus=+dd.bonus||0; // thưởng doanh số (nhập tay)
    const kotsu=+dd.kotsu||0; // 交通費 (phụ cấp, cộng thêm)
    const tongNhan=take+bonus+kotsu; // Tổng nhận = 差引支給額 + thưởng + 交通費
    const cash=tongNhan; // 現金支給額 = Tổng nhận
    return {s,count:ds.length,gross,net,p,pay,dd,ded,take,bonus,kotsu,tongNhan,cash};
  });
}

  if(!rec[m])rec[m]={bhxh:0,bhtn:0,tax:0,other:0,bonus:0};
  return rec[m];
}

      <div>${L({vi:'Bảo hiểm xã hội',jp:'社会保険',en:'Social insurance'})} (社会保険): <b class="yen">${yen(ct.bhxh)}</b></div>
      <div>${L({vi:'Bảo hiểm thất nghiệp',jp:'雇用保険',en:'Unemployment insurance'})} (雇用保険): <b class="yen">${yen(ct.bhtn)}</b></div>
      <div>${L({vi:'Thuế thu nhập',jp:'所得税',en:'Income tax'})} (所得税): <b class="yen">${yen(ct.tax)}</b></div>
      <div>${L({vi:'Khác',jp:'その他',en:'Other'})} (その他): <b class="yen">${yen(ct.other)}</b></div>
    </div>
    <div style="margin-top:8px;font-size:14px">${L({vi:'Tổng phí khấu trừ',jp:'控除合計',en:'Total deductions'})}: <b class="yen">${yen(dedTot)}</b></div>
    <div class="sub">${L({vi:'Tự tổng hợp từ khấu trừ của từng nhân viên — liên kết với phiếu lương',jp:'各スタッフの控除から自動集計 — 給与明細と連携',en:'Auto-summed from each staff member — linked to pay slips'})}</div>
  </div>
  <div class="panel"><h3><span class="ti">${L({vi:'Bảng lương nhân viên',jp:'給与一覧',en:'Staff payroll'})}</span>
    <span><button class="btn sec sm" onclick="exportPDF('payroll')">⤓ PDF</button> <button class="btn sec sm" onclick="exportExcel('payroll')">⤓ Excel</button> <button class="btn sec sm" onclick="exportCSV('payroll')">⤓ CSV</button></span></h3>
    <div class="tw"><table class="tb"><thead><tr><th>${L({vi:'Nhân viên',jp:'スタッフ',en:'Staff'})}</th><th>${L({vi:'Cấp bậc',jp:'等級',en:'Rank'})}</th><th>${L({vi:'Số GD',jp:'取引数',en:'Deals'})}</th><th>${L({vi:'Tổng doanh số',jp:'総売上',en:'Total sales'})}</th><th>${L({vi:'Doanh số sau khấu trừ',jp:'控除後売上',en:'Sales after deduction'})}</th><th>${L({vi:'% Hoa hồng',jp:'歩合率',en:'Commission %'})}</th><th>${L({vi:'BHXH',jp:'社会保険',en:'Social ins.'})}</th><th>${L({vi:'BH thất nghiệp',jp:'雇用保険',en:'Unempl. ins.'})}</th><th>${L({vi:'Thuế TN',jp:'所得税',en:'Income tax'})}</th><th>${L({vi:'その他',jp:'その他',en:'Other'})}</th><th>${L({vi:'Tổng thực lãnh',jp:'支給額合計',en:'Total payment'})}</th><th>${L({vi:'Thực lãnh sau khấu trừ',jp:'差引支給額',en:'Net after deductions'})}</th><th>${L({vi:'Thưởng doanh số',jp:'売上賞与',en:'Sales bonus'})}</th><th>${L({vi:'交通費',jp:'交通費',en:'Transport'})}</th><th>${L({vi:'Tổng nhận',jp:'受取合計',en:'Total received'})}</th><th>${L({vi:'Chi trả tiền mặt',jp:'現金支給額',en:'Cash payment'})}</th><th></th></tr></thead><tbody>
    ${rows.map(r=>`<tr><td><b>${r.s.name}</b></td><td><span class="tag ${r.s.rank.toLowerCase()}">${rkName(r.s.rank)}</span></td><td>${r.count}</td><td class="yen">${yen(r.gross)}</td><td class="yen">${yen(r.net)}</td><td>${r.p}%</td>
      <td><input type="number" style="width:90px;padding:3px 6px" value="${r.dd.bhxh||''}" onchange="saveDeduct('${r.s.id}','bhxh',this.value)" placeholder="0"></td>
      <td><input type="number" style="width:90px;padding:3px 6px" value="${r.dd.bhtn||''}" onchange="saveDeduct('${r.s.id}','bhtn',this.value)" placeholder="0"></td>
      <td><input type="number" style="width:90px;padding:3px 6px" value="${r.dd.tax||''}" onchange="saveDeduct('${r.s.id}','tax',this.value)" placeholder="0"></td>
      <td><input type="number" style="width:90px;padding:3px 6px" value="${r.dd.other||''}" onchange="saveDeduct('${r.s.id}','other',this.value)" placeholder="0"></td>
      <td class="yen"><b>${yen(r.pay)}</b></td><td class="yen"><b>${yen(r.take)}</b></td><td><input type="number" style="width:90px;padding:3px 6px" value="${r.dd.bonus||''}" onchange="saveDeduct('${r.s.id}','bonus',this.value)" placeholder="0"></td><td><input type="number" style="width:90px;padding:3px 6px" value="${r.dd.kotsu||''}" onchange="saveDeduct('${r.s.id}','kotsu',this.value)" placeholder="0"></td><td class="yen"><b>${yen(r.tongNhan)}</b></td><td class="yen">${yen(r.cash)}</td>
      <td><button class="btn sec sm" onclick="payslip('${r.s.id}')">🧾 ${L({vi:'Phiếu lương',jp:'給与明細',en:'Pay slip'})}</button></td></tr>`).join('')}
    <tr style="background:var(--g50)"><td colspan=3><b>${L({vi:'TỔNG',jp:'合計',en:'TOTAL'})}</b></td><td class="yen"><b>${yen(grossTot)}</b></td><td class="yen"><b>${yen(netTot)}</b></td><td></td><td class="yen"><b>${yen(ct.bhxh)}</b></td><td class="yen"><b>${yen(ct.bhtn)}</b></td><td class="yen"><b>${yen(ct.tax)}</b></td><td class="yen"><b>${yen(ct.other)}</b></td><td class="yen"><b>${yen(tot)}</b></td><td class="yen"><b>${yen(takeTot)}</b></td><td class="yen"><b>${yen(bonusTot)}</b></td><td class="yen"><b>${yen(kotsuTot)}</b></td><td class="yen"><b>${yen(tongNhanTot)}</b></td><td class="yen"><b>${yen(cashTot)}</b></td><td></td></tr>
    </tbody></table></div>
    <div class="co">${coLine()}</div>
  </div>
  <div id="payslipBox"></div>`;
}

function payDates(){if(!S.payDates)S.payDates={};var m=VIEW.month;if(!S.payDates[m])S.payDates[m]={shime:m+'-20',shiharai:m+'-25'};return S.payDates[m];}
function savePayDate(id,which,val){payDates();S.payDates[VIEW.month][which]=val;save();payslip(id);}
function jdate(s){if(!s)return '';var p=String(s).split('-');return p.length===3?(p[0]+'年'+(+p[1])+'月'+(+p[2])+'日'):s;}

function psData(id){
  var r=payrollRows().find(function(x){return x.s.id===id;});if(!r)return null;var dd=r.dd;
  function g(k){return +dd[k]||0;}
  var base=r.pay;
  var A={teate:g('teate'),kotsuT:g('kotsuT'),rafu:g('rafu'),sonota:g('sonota'),zangyo:g('zangyo'),kyuteate:g('kyuteate'),shinya:g('shinya'),naiken:g('naiken'),kazei:g('kazei'),hikazei:g('hikazei')};
  var shikyu=base+A.teate+A.kotsuT+A.rafu+A.sonota+A.zangyo+A.kyuteate+A.shinya+A.naiken+A.kazei+A.hikazei;
  var D={kenko:g('kenko'),kaigo:g('kaigo'),kosei:g('kosei'),koyo:g('koyo'),shotoku:g('shotoku'),jumin:g('jumin')};
  var kojo=D.kenko+D.kaigo+D.kosei+D.koyo+D.shotoku+D.jumin;
  var shaho=D.kenko+D.kaigo+D.kosei+D.koyo;
  var kazeiTaisho=shikyu-A.hikazei;
  var sashihiki=shikyu-kojo;
  var genkin=g('genkin');var furikomi=sashihiki-genkin;
  return {r:r,base:base,A:A,D:D,shikyu:shikyu,kojo:kojo,shaho:shaho,kazeiTaisho:kazeiTaisho,sashihiki:sashihiki,genkin:genkin,furikomi:furikomi};
}

/* ô nhập tay (yen) / tính sẵn / chấm công */
function _y(id,k,v,mode){if(mode==='edit')return '<td class="psV"><input type="number" value="'+(v||'')+'" placeholder="0" onchange="saveDeduct(\''+id+'\',\''+k+'\',this.value,true)"></td>';return '<td class="psV yenc">'+yen(v)+'</td>';}
function _n(id,k,v,mode){if(mode==='edit')return '<td class="psV"><input type="number" value="'+(v||'')+'" onchange="saveDeduct(\''+id+'\',\''+k+'\',this.value,true)"></td>';return '<td class="psV">'+(v||'')+'</td>';}
function _c(v){return '<td class="psV calc yenc">'+yen(v)+'</td>';}
function _L(t,cls){return '<td class="psL '+(cls||'')+'">'+t+'</td>';}
function _b(n){var s='';for(var i=0;i<(n||1);i++)s+='<td class="psE"></td>';return s;}
function _sec(t){return '<tr><td class="psSec" colspan="5">'+t+'</td></tr>';}

function psHTML(id,mode){
  var p=psData(id);if(!p)return '';var r=p.r,dd=r.dd,id2=r.s.id;
  function dval(k){return dd[k]||'';}
  var t='<table class="ps-tb"><tbody>';
  // 勤怠
  t+=_sec(L({vi:'Chấm công',jp:'勤怠項目',en:'Attendance'}));
  t+='<tr>'+_L('出勤日数')+_L('休日出勤日数')+_L('有給日数')+_L('欠勤日数')+_L('遅刻・早退回数')+'</tr>';
  t+='<tr>'+_n(id2,'shukkin',dval('shukkin'),mode)+_n(id2,'kyout',dval('kyout'),mode)+_n(id2,'yukyu',dval('yukyu'),mode)+_n(id2,'kekkin',dval('kekkin'),mode)+_n(id2,'chikoku',dval('chikoku'),mode)+'</tr>';
  t+='<tr>'+_L('所定労働時間')+_L('時間外労働時間')+_L('休日労働時間')+_L('深夜時間')+_L('遅刻・早退時間')+'</tr>';
  t+='<tr>'+_n(id2,'shotei',dval('shotei'),mode)+_n(id2,'jikangai',dval('jikangai'),mode)+_n(id2,'kyurou',dval('kyurou'),mode)+_n(id2,'shinyaT',dval('shinyaT'),mode)+_n(id2,'chikokuT',dval('chikokuT'),mode)+'</tr>';
  // 支給
  t+=_sec(L({vi:'Khoản chi trả',jp:'支給項目',en:'Earnings'}));
  t+='<tr>'+_L('基本給')+_L('手当')+_L('交通手当')+_L('ラフライン')+_L('そのほか')+'</tr>';
  t+='<tr>'+_c(p.base)+_y(id2,'teate',p.A.teate,mode)+_y(id2,'kotsuT',p.A.kotsuT,mode)+_y(id2,'rafu',p.A.rafu,mode)+_y(id2,'sonota',p.A.sonota,mode)+'</tr>';
  t+='<tr>'+_L('普通残業手当')+_L('休日手当')+_L('深夜手当')+_L('内見交通費')+_L('課税通勤手当')+'</tr>';
  t+='<tr>'+_y(id2,'zangyo',p.A.zangyo,mode)+_y(id2,'kyuteate',p.A.kyuteate,mode)+_y(id2,'shinya',p.A.shinya,mode)+_y(id2,'naiken',p.A.naiken,mode)+_y(id2,'kazei',p.A.kazei,mode)+'</tr>';
  t+='<tr>'+_L('非課税通勤手当')+_b(3)+_L('支給額合計','psTot')+'</tr>';
  t+='<tr>'+_y(id2,'hikazei',p.A.hikazei,mode)+_b(3)+_c(p.shikyu)+'</tr>';
  // 控除
  t+=_sec(L({vi:'Khấu trừ',jp:'控除項目',en:'Deductions'}));
  t+='<tr>'+_L('健康保険')+_L('介護保険')+_L('厚生年金')+_L('雇用保険')+_L('')+'</tr>';
  t+='<tr>'+_y(id2,'kenko',p.D.kenko,mode)+_y(id2,'kaigo',p.D.kaigo,mode)+_y(id2,'kosei',p.D.kosei,mode)+_y(id2,'koyo',p.D.koyo,mode)+_b(1)+'</tr>';
  t+='<tr>'+_L('所得税')+_L('住民税')+_b(2)+_L('控除額合計','psTot')+'</tr>';
  t+='<tr>'+_y(id2,'shotoku',p.D.shotoku,mode)+_y(id2,'jumin',p.D.jumin,mode)+_b(2)+_c(p.kojo)+'</tr>';
  // 合計
  t+=_sec(L({vi:'Tổng hợp',jp:'合計',en:'Totals'}));
  t+='<tr>'+_L('社会保険合計')+_L('課税対象額')+_b(3)+'</tr>';
  t+='<tr>'+_c(p.shaho)+_c(p.kazeiTaisho)+_b(3)+'</tr>';
  t+='<tr>'+_L('振込支給額')+_L('現金支給額')+_b(2)+_L('差引支給額','psTot')+'</tr>';
  t+='<tr>'+_c(p.furikomi)+_y(id2,'genkin',p.genkin,mode)+_b(2)+_c(p.sashihiki)+'</tr>';
  t+='</tbody></table>';
  return t;
}

function psHeader(id,mode){
  var r=payrollRows().find(function(x){return x.s.id===id;});if(!r)return '';var pd=payDates();
  var rank=r.s.rank, busho=(RK(rank)&&RK(rank).jp)||rkName(rank), rankName=rkName(rank), comm=r.p;
  var shCell = mode==='edit'
    ? '<td class="psV"><input type="date" value="'+(pd.shiharai||'')+'" onchange="savePayDate(\''+id+'\',\'shiharai\',this.value)"></td>'
    : '<td class="psV">'+jdate(pd.shiharai)+'</td>';
  var smCell = mode==='edit'
    ? '<td class="psV"><input type="date" value="'+(pd.shime||'')+'" onchange="savePayDate(\''+id+'\',\'shime\',this.value)"></td>'
    : '<td class="psV">'+jdate(pd.shime)+'</td>';
  return '<div class="ps-hd"><table class="ps-hdtb"><tr>'
    +'<td class="ps-logo"><img src="'+PS_LOGO+'" height="34"><div class="ps-co">'+CO.jp+'<br>'+CO.addr+'<br>TEL '+CO.tel+' ・ '+CO.email+'<br>'+CO.lic+'</div></td>'
    +'</tr></table></div>'
    +'<div class="ps-title">給与明細書（'+VIEW.month+'）</div>'
    +'<div class="ps-meta">取引数 '+r.count+'件 ・ 総売上 '+yen(r.gross)+' ・ 控除後売上 '+yen(r.net)+' ・ 歩合率 '+comm+'%</div>'
    +'<table class="ps-info">'
    +'<tr><td class="psL">部署</td><td class="psV">'+busho+'</td><td class="psL">給与支給日</td>'+shCell+'<td class="psL">給与締日</td>'+smCell+'</tr>'
    +'<tr><td class="psL">氏名</td><td class="psV"><b>'+r.s.name+'</b> 様</td><td class="psL">等級</td><td class="psV">'+rankName+'</td><td class="psL">歩合率</td><td class="psV">'+comm+'%</td></tr>'
    +'</table>';
}
function payslip(id,noScroll){
  var box=document.getElementById('payslipBox');if(!box)return;
  box.innerHTML='<div class="panel" id="ps"><h3><span class="ti">🧾 '+L({vi:'Phiếu lương',jp:'給与明細',en:'Pay slip'})+' — '+(payrollRows().find(function(x){return x.s.id===id;})||{s:{}}).s.name+'</span>'
    +'<span class="noprint"><button class="btn sec sm" onclick="psPDF(\''+id+'\')">⤓ PDF</button> <button class="btn sec sm" onclick="psWord(\''+id+'\')">⤓ Word</button> <button class="btn sec sm" onclick="window.print()">🖨 '+L({vi:'In',jp:'印刷',en:'Print'})+'</button></span></h3>'
    +'<div class="ps-doc">'+psHeader(id,'edit')+psHTML(id,'edit')+'</div></div>';
  if(!noScroll)box.scrollIntoView({behavior:'smooth'});
}

function psExportDoc(id){return '<div class="ps-doc">'+psHeader(id,'view')+psHTML(id,'view')+'</div>';}
function psPDF(id){
  var host=document.getElementById('ps-print');if(!host){host=document.createElement('div');host.id='ps-print';document.body.appendChild(host);}
  host.innerHTML=psExportDoc(id);document.body.classList.add('pps');
  window.print();
  setTimeout(function(){document.body.classList.remove('pps');host.innerHTML='';},400);
}
function psWord(id){
  var r=payrollRows().find(function(x){return x.s.id===id;});
  var css='<style>body{font-family:"Yu Gothic","MS Gothic",sans-serif;font-size:12px}.ps-doc{width:680px}.ps-hd{background:#0F6E56;color:#fff;padding:10px}.ps-hd img{vertical-align:middle}.ps-co{font-size:10px;margin-top:4px;line-height:1.5}.ps-title{font-size:18px;font-weight:bold;margin:8px 0}table{border-collapse:collapse;width:100%}.ps-tb td,.ps-info td{border:1px solid #888;padding:4px 6px}.psL{background:#eef2f1;font-size:11px;white-space:nowrap}.psSec{background:#0F6E56;color:#fff;font-weight:bold;padding:4px 8px}.psV{text-align:right}.yenc{text-align:right}.calc{background:#fff7e0;font-weight:bold}.psTot{background:#dff0e9;font-weight:bold}.psE{background:#fafafa}</style>';
  var html='<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:w="urn:schemas-microsoft-com:office:word"><head><meta charset="utf-8">'+css+'</head><body>'+psExportDoc(id)+'</body></html>';
  var blob=new Blob(['\ufeff'+html],{type:'application/msword'});var url=URL.createObjectURL(blob);var a=document.createElement('a');a.href=url;a.download='給与明細_'+(r?r.s.name:id)+'_'+VIEW.month+'.doc';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

function addExp(){var date=d_('eDate').value,cat=d_('eCat').value,desc=(d_('eDesc').value||'').trim(),amt=+d_('eAmt').value||0;if(!date||!amt||amt<0){alert(L({vi:'Nhập ngày & số tiền',jp:'日付と金額を入力してください',en:'Enter date & amount'}));return;}
  S.expenses.push({id:uid('e'),date:date,cat:cat,desc:desc,amount:amt});logH('Thêm chi phí: '+catName(cat)+' '+yen(amt));save();}
function delExp(id){var _e=S.expenses.find(e=>e.id===id);S.expenses=S.expenses.filter(e=>e.id!==id);logH('Xoá chi phí'+(_e?': '+catName(_e.cat)+' '+yen(_e.amount):''));save();}
function addExpCat(){var v=(d_('newCat').value||'').trim();if(!v)return;if(!S.expCats)S.expCats=[];if(S.expCats.indexOf(v)<0)S.expCats.push(v);save();}
function delExpCat(i){if(!confirm(L({vi:'Xoá khoản mục này khỏi trình đơn?',jp:'この科目をメニューから削除しますか？',en:'Remove this account from the menu?'})))return;(S.expCats||[]).splice(i,1);save();}

/* ----- KPI & BÁO CÁO ----- */
/* ===== MỤC TIÊU CÔNG TY & NHÂN VIÊN + ĐỀ XUẤT PHÁT TRIỂN ===== */
function rankDefaultContracts(s){return s?(s.rank==='L1'?3:(s.rank==='L2'?10:5)):5;}
function staffTarget(id){var s=staffById(id);var t=(S.staffTargets||{})[id]||{};return {sales:(t.sales!=null?+t.sales:0),contracts:(t.contracts!=null?+t.contracts:rankDefaultContracts(s)),note:t.note||''};}
function setStaffTarget(id,field,val){if(!S.staffTargets)S.staffTargets={};if(!S.staffTargets[id])S.staffTargets[id]={};S.staffTargets[id][field]=(field==='note'?val:Math.max(0,+val||0));logH('Mục tiêu NV: '+(staffById(id)?staffById(id).name:id)+' · '+field);save();}
function coTargetObj(){if(!S.coTargets)S.coTargets={};['year','month'].forEach(function(k){if(!S.coTargets[k])S.coTargets[k]={revenue:0,contracts:0,items:[],note:''};if(!S.coTargets[k].items)S.coTargets[k].items=[];});return S.coTargets;}
function setCoTarget(scope,field,val){coTargetObj();S.coTargets[scope][field]=(field==='note'?val:Math.max(0,+val||0));logH('Mục tiêu công ty: '+scope+' · '+field);save();}
function addCoItem(scope){coTargetObj();S.coTargets[scope].items.push({label:'',value:0});logH('Thêm mục tiêu công ty ('+scope+')');save();}
function setCoItem(scope,i,field,val){coTargetObj();var it=S.coTargets[scope].items[i];if(!it)return;it[field]=(field==='value'?Math.max(0,+val||0):val);save();}
function delCoItem(scope,i){coTargetObj();S.coTargets[scope].items.splice(i,1);logH('Xoá mục tiêu công ty ('+scope+')');save();}
function saveTargetsToast(){save();alert(L({vi:'Đã lưu mục tiêu.',jp:'目標を保存しました。',en:'Targets saved.'}));}
function doneDealsIn(pred){return (S.deals||[]).filter(function(d){return isDone(d)&&pred(d);});}
function coActual(scope){var key=scope==='year'?VIEW.month.slice(0,4):VIEW.month;var ds=doneDealsIn(function(d){return (scope==='year'?(d.date||'').slice(0,4):(d.date||'').slice(0,7))===key;});return {revenue:ds.reduce(function(x,d){return x+dealSales(d);},0),contracts:ds.length};}
function staffMonthActual(id){var ds=doneDealsIn(function(d){return d.staffId===id&&(d.date||'').slice(0,7)===VIEW.month;});return {sales:ds.reduce(function(x,d){return x+dealSales(d);},0),contracts:ds.length};}
function pctOf(a,t){return t>0?Math.min(100,Math.round(a/t*100)):(a>0?100:0);}
function tbar(a,t,isYen){var p=pctOf(a,t);var col=p>=100?'#2e7d32':(p>=60?'#1565c0':(p>=30?'#e8a13a':'#d32f2f'));var av=isYen?yen(a):a;var tv=isYen?yen(t):t;var rem=(t-a>0)?(isYen?yen(t-a):(t-a)):0;return `<div style="margin:3px 0"><div style="display:flex;justify-content:space-between;font-size:11px;margin-bottom:2px"><span>${av} / ${tv}</span><span style="font-weight:700;color:${col}">${p}%${(t-a>0)?(' · '+L({vi:'còn',jp:'残',en:'left'})+' '+rem):' ✓'}</span></div><div style="height:6px;background:var(--g100,#eee);border-radius:4px;overflow:hidden"><div style="height:100%;width:${p}%;background:${col}"></div></div></div>`;}
function staffSuggest(s){var t=staffTarget(s.id);var ac=staffMonthActual(s.id);var s3=staffSales3(s);var out=[];
  if(t.contracts>0){if(ac.contracts>=t.contracts)out.push(L({vi:'✅ Đạt mục tiêu hợp đồng ('+ac.contracts+'/'+t.contracts+') — cân nhắc nâng mục tiêu hoặc hỗ trợ đồng đội.',jp:'✅ 契約目標達成（'+ac.contracts+'/'+t.contracts+'）— 目標引上げ又はチーム支援を検討。',en:'✅ Contract target met ('+ac.contracts+'/'+t.contracts+') — raise the goal or help teammates.'}));else out.push(L({vi:'📌 Còn thiếu '+(t.contracts-ac.contracts)+' hợp đồng để đạt mục tiêu tháng.',jp:'📌 月目標まであと'+(t.contracts-ac.contracts)+'件。',en:'📌 '+(t.contracts-ac.contracts)+' more contracts to hit the monthly goal.'}));}
  if(t.sales>0){if(ac.sales>=t.sales)out.push(L({vi:'✅ Đạt doanh số mục tiêu ('+yen(ac.sales)+').',jp:'✅ 売上目標達成（'+yen(ac.sales)+'）。',en:'✅ Sales target met ('+yen(ac.sales)+').'}));else out.push(L({vi:'📌 Còn thiếu '+yen(t.sales-ac.sales)+' để đạt doanh số mục tiêu.',jp:'📌 売上目標まで'+yen(t.sales-ac.sales)+'。',en:'📌 '+yen(t.sales-ac.sales)+' more to hit the sales goal.'}));}
  if(s3[2]<s3[1]&&s3[1]<s3[0])out.push(L({vi:'⚠️ Doanh số giảm 2 tháng liên tiếp — cần kèm cặp & rà soát pipeline.',jp:'⚠️ 売上が2ヶ月連続減 — 指導とパイプライン見直しが必要。',en:'⚠️ Sales down 2 months in a row — coaching & pipeline review needed.'}));
  else if(s3[2]>s3[1]&&s3[1]>s3[0]&&s3[2]>0)out.push(L({vi:'📈 Doanh số tăng đều 3 tháng — ứng viên thưởng/thăng cấp.',jp:'📈 3ヶ月連続増 — 賞与・昇格候補。',en:'📈 Rising 3 months — bonus/promotion candidate.'}));
  if(t.note)out.push('🎯 '+escH(t.note));
  if(!out.length)out.push(L({vi:'Chưa đặt mục tiêu — hãy đặt doanh số & số hợp đồng để theo dõi.',jp:'目標未設定 — 売上・契約数を設定してください。',en:'No target set — set sales & contracts to track.'}));
  return out;
}
function coSuggest(){var out=[];var m=coActual('month');var y=coActual('year');var T=coTargetObj();
  if(T.month.revenue>0){var gap=T.month.revenue-m.revenue;if(gap>0)out.push(L({vi:'📌 Doanh thu tháng đạt '+pctOf(m.revenue,T.month.revenue)+'% — còn thiếu '+yen(gap)+'. Đẩy pipeline & chốt deal sang 契約完了.',jp:'📌 月売上'+pctOf(m.revenue,T.month.revenue)+'% — あと'+yen(gap)+'。',en:'📌 Month revenue '+pctOf(m.revenue,T.month.revenue)+'% — '+yen(gap)+' to go.'}));else out.push(L({vi:'✅ Đạt mục tiêu doanh thu tháng — cân nhắc nâng mục tiêu & thưởng đội ngũ.',jp:'✅ 月売上目標達成 — 目標引上げ・賞与を検討。',en:'✅ Monthly revenue target met — consider raising it & rewarding the team.'}));}
  if(T.month.contracts>0&&m.contracts<T.month.contracts)out.push(L({vi:'📋 Còn thiếu '+(T.month.contracts-m.contracts)+' hợp đồng so mục tiêu tháng.',jp:'📋 月契約目標まであと'+(T.month.contracts-m.contracts)+'件。',en:'📋 '+(T.month.contracts-m.contracts)+' contracts short of the monthly goal.'}));
  if(T.year.revenue>0)out.push(L({vi:'📅 Lũy kế năm: '+yen(y.revenue)+' / '+yen(T.year.revenue)+' ('+pctOf(y.revenue,T.year.revenue)+'%).',jp:'📅 年累計：'+yen(y.revenue)+' / '+yen(T.year.revenue)+'（'+pctOf(y.revenue,T.year.revenue)+'%）。',en:'📅 YTD: '+yen(y.revenue)+' / '+yen(T.year.revenue)+' ('+pctOf(y.revenue,T.year.revenue)+'%).'}));
  var byType={};(S.deals||[]).filter(isDone).forEach(function(d){byType[d.seg]=(byType[d.seg]||0)+dealSales(d);});var segs=Object.keys(byType);if(segs.length>1){var weak=segs.sort(function(a,b){return byType[a]-byType[b];})[0];out.push(L({vi:'🔍 Phân khúc yếu nhất: "'+segName(weak)+'" — xem lại nguồn lead & phân bổ nhân lực.',jp:'🔍 最も弱い分野：「'+segName(weak)+'」— リード源と人員配置を再検討。',en:'🔍 Weakest segment: "'+segName(weak)+'" — review lead sources & staffing.'}));}
  var perHead=S.staff.length?Math.round(m.contracts/S.staff.length*10)/10:0;out.push(L({vi:'👥 Năng suất tháng: '+perHead+' hợp đồng/người.',jp:'👥 今月の生産性：'+perHead+' 件/人。',en:'👥 Productivity: '+perHead+' contracts/person this month.'}));
  if(T.month.note)out.push('🎯 '+escH(T.month.note));
  return out;
}
function kpiTargetPanels(){
  var T=coTargetObj();

      ${tbar(act.revenue,o.revenue,true)}
      <div class="fld" style="margin-top:6px"><label>${L({vi:'Số hợp đồng mục tiêu',jp:'目標契約数',en:'Contracts target'})}</label><input type="number" value="${o.contracts||''}" onchange="setCoTarget('${scope}','contracts',this.value)" placeholder="0"></div>
      ${tbar(act.contracts,o.contracts,false)}
      <div style="font-size:11px;font-weight:700;color:var(--g500,#888);margin:10px 0 2px">${L({vi:'Mục tiêu khác',jp:'その他の目標',en:'Other targets'})}</div>
      ${items}
      <button class="btn sec sm" onclick="addCoItem('${scope}')">➕ ${L({vi:'Thêm mục tiêu',jp:'目標を追加',en:'Add target'})}</button>
      <div class="fld" style="margin-top:8px"><label>${L({vi:'Mục tiêu (ghi bằng chữ)',jp:'目標（自由記述）',en:'Target (free text)'})}</label><textarea rows="2" onchange="setCoTarget('${scope}','note',this.value)" placeholder="...">${escH(o.note||'')}</textarea></div>
    </div>`;
  }
  var coPanel=`<div class="panel"><h3><span class="ti">🎯 ${L({vi:'Mục tiêu công ty',jp:'会社目標',en:'Company targets'})}</span><span><button class="btn sm" onclick="saveTargetsToast()">💾 ${L({vi:'Lưu',jp:'保存',en:'Save'})}</button></span></h3>
    <div style="display:flex;gap:12px;flex-wrap:wrap">${coCol('month')}${coCol('year')}</div></div>`;
  var stRows=S.staff.map(function(s){var t=staffTarget(s.id);var ac=staffMonthActual(s.id);var raw=(S.staffTargets||{})[s.id]||{};
    return `<tr><td><b>${escH(s.name)}</b></td>
      <td><input type="number" value="${raw.sales!=null?raw.sales:''}" onchange="setStaffTarget('${s.id}','sales',this.value)" placeholder="0" style="width:120px"></td>

function evalStaff(s){
  const rule=PROMO[s.rank];if(!rule||!rule.auto)return{conds:[],met:0,total:0};
  const conds=rule.auto(s);const met=conds.filter(c=>c[1]).length;
  return {conds,met,total:conds.length,allMet:met===conds.length};
}
function nextRank(code){const o={L1:'L2',L2:'L3',L3:'L4',L4:'L5'};return o[code];}
/* ===== PROMO/PAY CONFIG (editable, persisted in S) ===== */
let promoEdit=false;
function deepC(o){return JSON.parse(JSON.stringify(o));}
function ensureCfg(){
  if(!S)return;
  if(!S.rankCfg){S.rankCfg={};Object.keys(RANKS).forEach(k=>{var r=RANKS[k];S.rankCfg[k]={code:r.code,vn:r.vn,jp:r.jp,en:r.en,comm:r.comm,grp:r.grp};});}
  if(!S.promoCfg){S.promoCfg={};Object.keys(PROMO).forEach(k=>{S.promoCfg[k]={kpi:deepC(PROMO[k].kpi),up:deepC(PROMO[k].up),down:PROMO[k].down?deepC(PROMO[k].down):null};});}
  if(!S.policyCfg){S.policyCfg={support:deepC(SUPPORT),terminate:deepC(TERMINATE),recruit:deepC(RECRUIT)};}
}
function RK(code){return (S&&S.rankCfg&&S.rankCfg[code])||RANKS[code];}
function PR(code){return (S&&S.promoCfg&&S.promoCfg[code])||PROMO[code];}
function POL(){return (S&&S.policyCfg)||{support:SUPPORT,terminate:TERMINATE,recruit:RECRUIT};}
function setLangObj(old,txt){var o=Object.assign({vi:txt,jp:txt,en:txt},old||{});o[LANG]=txt;return o;}
function escA(s){return (s+'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');}
function escH(s){return (s+'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function togglePromoEdit(){ensureCfg();promoEdit=true;renderPromo();}
function cancelPromoEdit(){promoEdit=false;renderPromo();}
function resetPromoCfg(){if(!confirm(L({vi:'Khôi phục thiết lập gốc theo PDF? Mọi chỉnh sửa sẽ mất.',jp:'PDF初期設定に戻しますか？編集内容は全て失われます。',en:'Restore default (PDF) settings? All edits will be lost.'})))return;delete S.rankCfg;delete S.promoCfg;delete S.policyCfg;ensureCfg();promoEdit=false;save();}
function savePromoCfg(){
  ensureCfg();
  var langKey={vi:'vn',jp:'jp',en:'en'}[LANG];
  Object.keys(RANKS).forEach(function(k){
    var nm=d_('rk_name_'+k); if(nm&&nm.value.trim())S.rankCfg[k][langKey]=nm.value.trim();
    var cm=d_('rk_comm_'+k); if(cm){var v=parseFloat(cm.value);if(!isNaN(v))S.rankCfg[k].comm=v;}
    var gp=d_('rk_grp_'+k); if(gp)S.rankCfg[k].grp=gp.value.trim()||'—';
    var kp=d_('pr_kpi_'+k); if(kp){var oldk=S.promoCfg[k].kpi;var lk=kp.value.split('\n').map(function(x){return x.trim();}).filter(Boolean);
      S.promoCfg[k].kpi=lk.map(function(ln,i){var p=ln.split('|');var a=(p[0]||'').trim();var b=(p.slice(1).join('|')||'').trim();var o=oldk[i]||[null,null];return [setLangObj(o[0],a),setLangObj(o[1],b)];});}
    var up=d_('pr_up_'+k); if(up){var oldu=S.promoCfg[k].up;var lu=up.value.split('\n').map(function(x){return x.trim();}).filter(Boolean);
      S.promoCfg[k].up=lu.map(function(ln,i){return setLangObj(oldu[i],ln);});}
    var dn=d_('pr_down_'+k); if(dn){var oldd=S.promoCfg[k].down||[];var ld=dn.value.split('\n').map(function(x){return x.trim();}).filter(Boolean);
      S.promoCfg[k].down=ld.length?ld.map(function(ln,i){return setLangObj(oldd[i],ln);}):null;}
  });
  var sp=d_('pol_support'),tm=d_('pol_terminate'),rc=d_('pol_recruit');
  if(sp)S.policyCfg.support=setLangObj(S.policyCfg.support,sp.value.trim());
  if(tm)S.policyCfg.terminate=setLangObj(S.policyCfg.terminate,tm.value.trim());
  if(rc)S.policyCfg.recruit=setLangObj(S.policyCfg.recruit,rc.value.trim());
  promoEdit=false;save();
  alert(L({vi:'Đã lưu thiết lập thăng cấp & lương.',jp:'昇格・給与設定を保存しました。',en:'Promotion & pay settings saved.'}));
}

/* ---- Markdown → HTML (heading, bold, italic, code, list, table, quote, hr, link) ---- */
function mdEsc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function mdInline(s){
  s=s.replace(/`([^`]+)`/g,function(m,c){return '<code>'+c+'</code>';});
  s=s.replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  s=s.replace(/\*([^*\n]+)\*/g,'<em>$1</em>');
  s=s.replace(/\[([^\]]+)\]\(([^)\s]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  return s;
}
function mdHtml(text){
  var lines=mdEsc(String(text||'')).split('\n');
  var out=[],inCode=false,code=[],listType=null,listBuf=[],tableBuf=[];
  function flushList(){if(listType){out.push('<'+listType+'>'+listBuf.join('')+'</'+listType+'>');listType=null;listBuf=[];}}
  function cells(line){return line.replace(/^\s*\|/,'').replace(/\|\s*$/,'').split('|').map(function(c){return c.trim();});}
  function flushTable(){
    if(!tableBuf.length)return; var raw=tableBuf.slice(); tableBuf=[];
    var hasSep=raw.length>1 && cells(raw[1]).every(function(c){return /^:?-{1,}:?$/.test(c);});
    var html='<table class="md-tb"><thead><tr>'+cells(raw[0]).map(function(c){return '<th>'+mdInline(c)+'</th>';}).join('')+'</tr></thead><tbody>';
    for(var r=(hasSep?2:1);r<raw.length;r++){html+='<tr>'+cells(raw[r]).map(function(c){return '<td>'+mdInline(c)+'</td>';}).join('')+'</tr>';}
    out.push(html+'</tbody></table>');
  }
  for(var i=0;i<lines.length;i++){
    var ln=lines[i];
    if(/^```/.test(ln)){ if(inCode){out.push('<pre><code>'+code.join('\n')+'</code></pre>');inCode=false;code=[];}else{flushList();flushTable();inCode=true;} continue; }
    if(inCode){code.push(ln);continue;}
    if(/^\s*\|.*\|\s*$/.test(ln)){tableBuf.push(ln);continue;}else{flushTable();}
    var h=ln.match(/^(#{1,4})\s+(.*)$/); if(h){flushList();out.push('<h'+Math.min(h[1].length+2,6)+'>'+mdInline(h[2])+'</h'+Math.min(h[1].length+2,6)+'>');continue;}
    if(/^\s*(---|\*\*\*|___)\s*$/.test(ln)){flushList();out.push('<hr>');continue;}
    var bq=ln.match(/^>\s?(.*)$/); if(bq){flushList();out.push('<blockquote>'+mdInline(bq[1])+'</blockquote>');continue;}
    var ol=ln.match(/^\s*\d+\.\s+(.*)$/); if(ol){if(listType&&listType!=='ol')flushList();listType='ol';listBuf.push('<li>'+mdInline(ol[1])+'</li>');continue;}
    var ul=ln.match(/^\s*[-*•]\s+(.*)$/); if(ul){if(listType&&listType!=='ul')flushList();listType='ul';listBuf.push('<li>'+mdInline(ul[1])+'</li>');continue;}
    if(/^\s*$/.test(ln)){flushList();continue;}
    flushList(); out.push('<p>'+mdInline(ln)+'</p>');
  }
  flushList();flushTable(); if(inCode)out.push('<pre><code>'+code.join('\n')+'</code></pre>');
  return out.join('');
}

/* ---- Gọi AI: proxy trước, fallback keyless (Claude.ai preview) ---- */
async function nasonCall(payload){
  try{ var r=await fetch(NASON_PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); if(r.ok){var j=await r.json(); if(j&&j.content)return j;} }catch(e){}
  try{ var r2=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); if(r2.ok){var j2=await r2.json(); if(j2&&j2.content)return j2;} }catch(e){}
  throw new Error('offline');
}
function nasonText(j){ try{return (j.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;}).join('\n').trim();}catch(e){return '';} }

/* ---- Tóm tắt dữ liệu hệ thống (100% chính xác, lấy thẳng từ app) ---- */
function nasonDataContext(){
  var L2=[]; try{
    var rows=payrollRows();
    var totalSales=rows.reduce(function(x,r){return x+r.gross;},0);
    var totalDeals=rows.reduce(function(x,r){return x+r.count;},0);
    var totalPay=rows.reduce(function(x,r){return x+r.pay;},0);
    var totalExp=0; try{totalExp=periodExpenses().reduce(function(x,e){return x+(e.amount||0);},0);}catch(e){}
    L2.push('Kỳ: '+VIEW.month+' ('+periodLabel()+')');
    L2.push('Tổng doanh số: '+yen(totalSales)+' | Số deal: '+totalDeals+' | Hoa hồng trả NV: '+yen(totalPay)+' | Chi phí: '+yen(totalExp)+' | Lợi nhuận ước: '+yen(totalSales-totalPay-totalExp));
    L2.push('Nhân viên ('+rows.length+'):');
    rows.forEach(function(r){ L2.push('- '+r.s.name+' ['+rkName(r.s.rank)+', '+r.p+'%]: '+r.count+' deal, DS '+yen(r.gross)+', hoa hồng '+yen(r.pay)); });
    try{ var ct=coTargetObj(); var ca=coActual('month'); var cy=coActual('year');
      L2.push('Mục tiêu THÁNG: DS '+yen(ct.month.revenue)+' (đạt '+yen(ca.revenue)+'), HĐ '+ct.month.contracts+' (đạt '+ca.contracts+')');
      L2.push('Mục tiêu NĂM: DS '+yen(ct.year.revenue)+' (đạt '+yen(cy.revenue)+'), HĐ '+ct.year.contracts+' (đạt '+cy.contracts+')');
    }catch(e){}
  }catch(e){ L2.push('(không đọc được dữ liệu)'); }
  return L2.join('\n');
}

    {k:['仲介','môi giới','手数料'],a:'**仲介手数料** (phí môi giới) thường là **1 tháng tiền thuê + thuế 10%** theo 宅建業法.'},
    {k:['更新料','gia hạn'],a:'**更新料** (phí gia hạn hợp đồng) thường **1 tháng** tiền thuê, đóng mỗi **2 năm**.'},
    {k:['người nước ngoài','外国人','保証','bảo lãnh'],a:'Người nước ngoài thuê nhà ở Nhật cần **在留カード**, thường cần **保証会社** (công ty bảo lãnh) hoặc **連帯保証人**, công việc/thu nhập ổn định để đậu **入居審査**. NASON HOME hỗ trợ trọn gói nhé! 💪🏠'}

function nasonQuick(t){ var i=document.getElementById('nasonInput'); if(i){i.value=t; nasonSend();} }
async function nasonSend(){
  if(NASON_BUSY)return; var inp=document.getElementById('nasonInput'); if(!inp)return;
  var msg=(inp.value||'').trim(); if(!msg)return; inp.value='';
  NASON_CHAT.push({role:'user',content:msg}); nasonRenderMsgs();
  var box=document.getElementById('nasonMsgs');
  box.insertAdjacentHTML('beforeend','<div class="nason-row bot" id="nasonTyping"><img src="'+NASON_KUN+'" class="nason-mav"><div class="nason-bub bot"><span class="nason-dots"><i></i><i></i><i></i></span></div></div>');
  box.scrollTop=box.scrollHeight; NASON_BUSY=true;
  try{
    var payload={model:'claude-sonnet-4-6',max_tokens:1300,system:nasonSys(),messages:NASON_CHAT.slice(-10).map(function(m){return {role:m.role,content:m.content};})};
    var j=await nasonCall(payload); var txt=nasonText(j); if(!txt)throw new Error('empty');
    NASON_CHAT.push({role:'assistant',content:txt});
  }catch(e){
    var kb=nasonKB(msg);
    NASON_CHAT.push({role:'assistant',content:kb||L({vi:'Xin lỗi, Nason Kun đang không kết nối được máy chủ AI 😢. Anh/chị kiểm tra mạng rồi thử lại nhé. (Khi offline em vẫn trả lời được vài câu hỏi cơ bản về BĐS Nhật.)',jp:'ごめんね、AIサーバーに接続できないみたい😢 後でもう一度試してね。',en:'Sorry, I cannot reach the AI server 😢 Please try again later.'})});
  }
  var tp=document.getElementById('nasonTyping'); if(tp)tp.remove();
  NASON_BUSY=false; nasonRenderMsgs();
}

    <div class="frm"><div class="fld"><label>${L({vi:'Thuế (%) trừ trước khi tính hoa hồng',jp:'歩合計算前に控除する税率(%)',en:'Tax (%) deducted before commission'})}</label><input type="number" min="0" max="100" value="${(S.cfg&&S.cfg.taxRate!=null)?S.cfg.taxRate:10}" onchange="saveTaxRate(this.value)" style="max-width:120px"></div></div>
    <div class="hint" style="margin-top:8px">${L({vi:'DS sau thuế = 売上 × (100 − thuế%)/100. Mặc định 10%. Đổi sẽ tự cập nhật toàn hệ thống.',jp:'課税後売上＝売上×(100−税率%)/100。既定10%。変更で全体に反映。',en:'After-tax sales = sales × (100 − tax%)/100. Default 10%. Changes update the whole system.'})}</div>
  </div>
  ${lockPanel()}`;
}
function exportAll(){const blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});const u=URL.createObjectURL(blob);const a=document.createElement('a');a.href=u;a.download='nasonhome_hr_backup.json';a.click();}
function resetData(){if(!confirm(L({vi:'Khôi phục dữ liệu mẫu? Mọi dữ liệu hiện tại sẽ mất.',jp:'サンプルデータに戻しますか？現在のデータは全て失われます。',en:'Restore sample data? All current data will be lost.'})))return;S=seed();save();}

/* ---------- EXPORT (Excel/PDF) với thông tin pháp nhân ---------- */
function coRowsAOA(){return [[CO.vn+' / '+CO.jp],[CO.lic],[CO.addr],['TEL '+CO.tel+' · '+CO.email],[L({vi:'Đại diện',jp:'代表',en:'Rep.'})+': '+CO.rep],[]];}
function buildExportAOA(tab){
  let aoa=coRowsAOA(),title='',a=agg();
  if(tab==='dash'){title=L({vi:'Tổng quan',jp:'概要',en:'Overview'});aoa.push([L({vi:'Chỉ số',jp:'指標',en:'Metric'}),L({vi:'Giá trị (¥)',jp:'金額 (¥)',en:'Value (¥)'})]);
    aoa.push([L({vi:'Tổng doanh số (sau 広告)',jp:'総売上（広告込）',en:'Total sales (incl. ad)'}),a.sales],[L({vi:'Tổng phí môi giới',jp:'仲介手数料合計',en:'Total brokerage fee'}),a.broker],[L({vi:'Tổng 広告 (AD)',jp:'広告料合計',en:'Total advertising'}),a.ad],[L({vi:'Tổng lương',jp:'給与総額',en:'Total payroll'}),a.salary],[L({vi:'Lãi chưa khấu trừ chi phí',jp:'経費控除前利益',en:'Profit before expenses'}),a.profitBefore],[L({vi:'Lãi sau khấu trừ chi phí',jp:'経費控除後利益',en:'Profit after expenses'}),a.profitAfter]);}
  else if(tab==='deal'){title=L({vi:'Giao dịch',jp:'取引',en:'Deals'});dealAOA(false).forEach(function(r){aoa.push(r);});}
  else if(tab==='client'){title=L({vi:'Khách hàng',jp:'顧客',en:'Clients'});dealAOA(false).forEach(function(r){aoa.push(r);});}
  else if(tab==='staff'){title=L({vi:'Nhân viên',jp:'スタッフ',en:'Staff'});dealAOA(true).forEach(function(r){aoa.push(r);});}
  else if(tab==='payroll'){title=L({vi:'Bảng lương',jp:'給与',en:'Payroll'});aoa.push([L({vi:'Nhân viên',jp:'スタッフ',en:'Staff'}),L({vi:'Cấp bậc',jp:'等級',en:'Rank'}),L({vi:'Số GD',jp:'取引数',en:'Deals'}),L({vi:'Tổng doanh số',jp:'総売上',en:'Total sales'}),L({vi:'DS tính HH (sau thuế)',jp:'課税後売上',en:'Comm. base (after tax)'}),L({vi:'%HH',jp:'歩合%',en:'Comm %'}),L({vi:'BHXH',jp:'社会保険',en:'Social ins.'}),L({vi:'BH thất nghiệp',jp:'雇用保険',en:'Unempl. ins.'}),L({vi:'Thuế TN',jp:'所得税',en:'Income tax'}),L({vi:'その他',jp:'その他',en:'Other'}),L({vi:'Tổng thực lãnh',jp:'支給額合計',en:'Total payment'}),L({vi:'Thực lãnh sau khấu trừ',jp:'差引支給額',en:'Net after deductions'}),L({vi:'Thưởng doanh số',jp:'売上賞与',en:'Sales bonus'}),L({vi:'交通費',jp:'交通費',en:'Transport'}),L({vi:'Tổng nhận',jp:'受取合計',en:'Total received'}),L({vi:'Chi trả tiền mặt',jp:'現金支給額',en:'Cash payment'})]);
    payrollRows().forEach(r=>aoa.push([r.s.name,rkName(r.s.rank),r.count,r.gross,r.net,r.p,r.dd.bhxh||0,r.dd.bhtn||0,r.dd.tax||0,r.dd.other||0,r.pay,r.take,r.bonus,r.kotsu,r.tongNhan,r.cash]));
    var _r=payrollRows();var _tot=_r.reduce(function(x,r){return x+r.pay;},0);var _ct=companyDeductByType();var _tk=_r.reduce(function(x,r){return x+r.take;},0);var _ck=_r.reduce(function(x,r){return x+r.cash;},0);var _bn=_r.reduce(function(x,r){return x+r.bonus;},0);var _kt=_r.reduce(function(x,r){return x+r.kotsu;},0);var _tn=_r.reduce(function(x,r){return x+r.tongNhan;},0);var _gr=_r.reduce(function(x,r){return x+r.gross;},0);var _nt=_r.reduce(function(x,r){return x+r.net;},0);
    aoa.push([]);aoa.push([L({vi:'TỔNG',jp:'合計',en:'TOTAL'}),'','',_gr,_nt,'',_ct.bhxh,_ct.bhtn,_ct.tax,_ct.other,_tot,_tk,_bn,_kt,_tn,_ck]);}
  else if(tab==='expense'){title=L({vi:'Chi phí',jp:'経費',en:'Expenses'});aoa.push([L({vi:'STT',jp:'No.',en:'No.'}),L({vi:'Ngày',jp:'日付',en:'Date'}),L({vi:'Khoản mục',jp:'科目',en:'Account'}),L({vi:'Nội dung',jp:'取引内容',en:'Description'}),L({vi:'Số tiền ¥',jp:'金額 ¥',en:'Amount ¥'})]);
    periodExpenses().slice().sort((a,b)=>(expDate(a)<expDate(b)?-1:1)).forEach((e,i)=>aoa.push([i+1,expDate(e),catName(e.cat),e.desc||'',e.amount]));}
  else if(tab==='kpi'){title='KPI';aoa.push([L({vi:'Nhân viên',jp:'スタッフ',en:'Staff'}),L({vi:'Cấp bậc',jp:'等級',en:'Rank'}),L({vi:'Số GD',jp:'取引数',en:'Deals'}),L({vi:'Doanh số 売上',jp:'売上',en:'Sales'}),L({vi:'DS tính HH (sau thuế)',jp:'課税後売上',en:'Comm. base (after tax)'}),L({vi:'Hoa hồng',jp:'歩合',en:'Commission'})]);
    S.staff.forEach(s=>{const ds=periodDeals().filter(d=>d.staffId===s.id&&isDone(d));aoa.push([s.name,rkName(s.rank),ds.length,ds.reduce((x,d)=>x+dealSales(d),0),ds.reduce((x,d)=>x+dealNet(d),0),ds.reduce((x,d)=>x+dealComm(d),0)]);});
    aoa.push([]);aoa.push([L({vi:'STT',jp:'No.',en:'No.'}),L({vi:'Ngày',jp:'日付',en:'Date'}),L({vi:'Nhân viên',jp:'担当',en:'Staff'}),L({vi:'Phí môi giới ¥',jp:'仲介手数料',en:'Brokerage'}),'広告',L({vi:'Doanh số 売上',jp:'売上',en:'Sales'})]);
    periodDeals().slice().sort((x,y)=>(x.date<y.date?-1:1)).forEach((d,i)=>{var s=staffById(d.staffId);aoa.push([i+1,d.date,s?s.name:'',d.broker,d.ad,dealSales(d)]);});}
  return {aoa:aoa,title:title};
}
function exportExcel(tab){var r=buildExportAOA(tab);const ws=XLSX.utils.aoa_to_sheet(r.aoa);const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,r.title.slice(0,28));XLSX.writeFile(wb,`NASONHOME_${r.title}_${VIEW.month}.xlsx`);}
function exportCSV(tab){var r=buildExportAOA(tab);var NL=String.fromCharCode(13,10),Q=String.fromCharCode(34),LF=String.fromCharCode(10),CR=String.fromCharCode(13);var csv=r.aoa.map(function(row){return row.map(function(c){if(c===null||c===undefined)c='';c=String(c);if(c.indexOf(',')>=0||c.indexOf(Q)>=0||c.indexOf(LF)>=0||c.indexOf(CR)>=0)c=Q+c.split(Q).join(Q+Q)+Q;return c;}).join(',');}).join(NL);var blob=new Blob([String.fromCharCode(0xFEFF)+csv],{type:'text/csv;charset=utf-8;'});var url=URL.createObjectURL(blob);var lk=document.createElement('a');lk.href=url;lk.download='NASONHOME_'+r.title+'_'+VIEW.month+'.csv';document.body.appendChild(lk);lk.click();document.body.removeChild(lk);URL.revokeObjectURL(url);}
function exportPDF(tab){window.print();}

/* ---------- shared bits ---------- */
function coLine(){return `${CO.jp} · ${CO.vn} · ${CO.lic} · TEL ${CO.tel} · ${CO.email}`;}
function coFooter(){return `<div class="co">${CO.vn} / ${CO.jp} / ${CO.en}<br>${CO.lic} · ${CO.addr}<br>TEL ${CO.tel} · ${CO.email} · ${L({vi:'Đại diện',jp:'代表',en:'Rep.'})} ${CO.rep}</div>`;}
function periodLabel(){const m=VIEW.month,y=m.slice(0,4);if(VIEW.period==='year')return L({vi:'Năm '+y,jp:y+'年',en:'Year '+y});if(VIEW.period==='day')return L({vi:'Tháng '+m+' (xem ngày)',jp:m+'（日別）',en:m+' (daily)'});return L({vi:'Tháng '+m,jp:m,en:m});}

/* ---------- tabs / period / lock ---------- */
/* ===== PER-TAB LOCKS ===== */
function hashPw(s){var h=5381;s=''+s;for(var i=0;i<s.length;i++){h=((h<<5)+h+s.charCodeAt(i))>>>0;}return 'h'+h.toString(36);}
function getLocks(){return (S&&S.locks)||{};}
function isLocked(t){return !!getLocks()[t];}
function unlockedSet(){try{return JSON.parse(sessionStorage.getItem('nsh_unlocked')||'[]');}catch(e){return [];}}
function isUnlocked(t){return unlockedSet().indexOf(t)>=0;}
function markUnlocked(t){var a=unlockedSet();if(a.indexOf(t)<0){a.push(t);sessionStorage.setItem('nsh_unlocked',JSON.stringify(a));}}
function tabName(t){var m={dash:{vi:'Tổng quan',jp:'概要',en:'Overview'},deal:{vi:'Nhập Deal',jp:'取引入力',en:'New Deal'},client:{vi:'Khách hàng',jp:'顧客',en:'Customers'},staff:{vi:'Nhân viên',jp:'スタッフ',en:'Staff'},payroll:{vi:'Bảng lương',jp:'給与',en:'Payroll'},expense:{vi:'Chi phí',jp:'経費',en:'Expenses'},kpi:{vi:'KPI & Báo cáo',jp:'指標・報告',en:'KPI & Reports'},promo:{vi:'Thăng cấp & Lương',jp:'昇格・昇給',en:'Promotion & Pay'},ai:{vi:'AI Phân tích',jp:'AI分析',en:'AI Analysis'},settings:{vi:'Cài đặt',jp:'設定',en:'Settings'}};return L(m[t]||{vi:t,jp:t,en:t});}
function tryUnlock(t){
  var pw=prompt(L({vi:'🔒 Mục “'+tabName(t)+'” đã khóa. Nhập mật khẩu:',jp:'🔒「'+tabName(t)+'」はロック中です。パスワードを入力:',en:'🔒 “'+tabName(t)+'” is locked. Enter password:'}));
  if(pw===null)return false;
  if(hashPw(pw)===getLocks()[t]||pw===PW){markUnlocked(t);return true;}
  alert(L({vi:'Sai mật khẩu.',jp:'パスワードが違います。',en:'Wrong password.'}));return false;
}
function markLocks(){var bs=document.querySelectorAll('#tabs button');bs.forEach(function(b){var t=b.dataset.t;var base=b.getAttribute('data-'+LANG)||b.getAttribute('data-vi')||'';b.textContent=(isLocked(t)?(isUnlocked(t)?'🔓 ':'🔒 '):'')+base;});}
function setTabLock(t){
  var inp=d_('lock_'+t);if(!inp)return;var v=inp.value.trim();
  if(!v){alert(L({vi:'Hãy nhập mật khẩu trước.',jp:'先にパスワードを入力してください。',en:'Enter a password first.'}));return;}
  if(!S.locks)S.locks={};S.locks[t]=hashPw(v);markUnlocked(t);inp.value='';save();
  alert(L({vi:'Đã đặt khóa cho mục “'+tabName(t)+'”.',jp:'「'+tabName(t)+'」をロックしました。',en:'Locked “'+tabName(t)+'”.'}));
}
function clearTabLock(t){
  if(!isLocked(t))return;
  if(!confirm(L({vi:'Gỡ khóa mục “'+tabName(t)+'”?',jp:'「'+tabName(t)+'」のロックを解除しますか？',en:'Remove the lock on “'+tabName(t)+'”?'})))return;
  delete S.locks[t];save();
}
function lockPanel(){
  var TABS=['dash','deal','client','staff','payroll','expense','kpi','promo','ai','settings'];
  var rows=TABS.map(function(t){var lk=isLocked(t);
    return '<div class="frm" style="align-items:flex-end;border-bottom:1px solid #eef1f4;padding:7px 0;margin:0">'
      +'<div class="fld" style="min-width:170px;flex:1"><label>'+(lk?'🔒':'🔓')+' '+tabName(t)+'</label>'
      +'<input type="password" id="lock_'+t+'" placeholder="'+(lk?L({vi:'Nhập MK mới để đổi…',jp:'新パスワード…',en:'New password…'}):L({vi:'Đặt mật khẩu…',jp:'パスワード設定…',en:'Set password…'}))+'"></div>'
      +'<div class="btnrow" style="margin:0">'
      +'<button class="btn sm" onclick="setTabLock(\''+t+'\')">'+(lk?L({vi:'Đổi MK',jp:'変更',en:'Change'}):L({vi:'🔒 Khóa',jp:'🔒 ロック',en:'🔒 Lock'}))+'</button>'
      +(lk?' <button class="btn sec sm" onclick="clearTabLock(\''+t+'\')">'+L({vi:'Gỡ khóa',jp:'解除',en:'Unlock'})+'</button>':'')
      +'</div></div>';}).join('');
  return '<div class="panel"><h3><span class="ti">'+L({vi:'🔒 Khóa từng mục (mật khẩu riêng)',jp:'🔒 メニュー別ロック（個別パスワード）',en:'🔒 Per-section lock (individual passwords)'})+'</span></h3>'
    +'<div class="note">'+L({vi:'Đặt mật khẩu riêng cho từng mục. Khi mở mục đã khóa sẽ hỏi mật khẩu, mở 1 lần dùng cho cả phiên. Mật khẩu tổng “'+PW+'” luôn mở được mọi khóa (khôi phục khi quên).',jp:'各メニューに個別パスワードを設定。ロック中のメニューを開く際にパスワードを要求（同セッション中は1回）。マスターパスワード「'+PW+'」で常に解除可能（緊急用）。',en:'Set a separate password per section. Opening a locked section asks for the password once per session. The master password “'+PW+'” always unlocks any section (recovery).'})+'</div>'
    +rows+'</div>';
}
function enforceInitialLock(){
  if(isLocked(VIEW.tab)&&!isUnlocked(VIEW.tab)){
    var TABS=['dash','deal','client','staff','payroll','expense','kpi','promo','ai','settings'];
    var open=TABS.filter(function(t){return !isLocked(t);})[0];
    if(open){VIEW.tab=open;
      document.querySelectorAll('#tabs button').forEach(function(b){b.classList.toggle('on',b.dataset.t===open);});
      document.querySelectorAll('section.tab').forEach(function(s){s.classList.toggle('on',s.id==='t-'+open);});
      }
  }
  markLocks();
}
function switchTab(t){
  if(isLocked(t)&&!isUnlocked(t)){if(!tryUnlock(t))return;}
  VIEW.tab=t;
  document.querySelectorAll('#tabs button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  document.querySelectorAll('section.tab').forEach(s=>s.classList.toggle('on',s.id==='t-'+t));
  if(t==='nason')renderNason();
  markLocks();
  
}
function unlock(){if(d_('pw').value===PW){sessionStorage.setItem('nsh_ok','1');document.getElementById('lock').style.display='none';document.getElementById('app').style.display='flex';boot();}
  else{d_('lerr').style.display='block';d_('pw').value='';d_('pw').focus();}}
function boot(){
  S=load();if(!S){S=seed();save();}
  if(!S.history)S.history=[];if(!S.statusCfg||!S.statusCfg.length)S.statusCfg=DEFAULT_STATUS.map(function(x){return {label:x.label,color:x.color,text:x.text};});if(!S.coTargets)S.coTargets={year:{revenue:0,contracts:0,items:[],note:''},month:{revenue:0,contracts:0,items:[],note:''}};if(!S.staffTargets)S.staffTargets={};if(!S.customExp)S.customExp=['','','','',''];if(!S.expCats||!S.expCats.length)S.expCats=DEFAULT_EXP_CATS.slice();if(!S.locks)S.locks={};if(!S.cfg)S.cfg={};if(typeof S.cfg.taxRate!=='number')S.cfg.taxRate=10;if(S.deduct){Object.keys(S.deduct).forEach(function(_id){var _r=S.deduct[_id];if(_r&&(typeof _r.bhxh==='number'||typeof _r.bhtn==='number'||typeof _r.tax==='number'||typeof _r.other==='number'||typeof _r.bonus==='number')){var _nr={};_nr[VIEW.month]={bhxh:+_r.bhxh||0,bhtn:+_r.bhtn||0,tax:+_r.tax||0,other:+_r.other||0,bonus:+_r.bonus||0};S.deduct[_id]=_nr;}});}ensureCfg();if(!S.locksOpened){S.locks={};S.locksOpened=true;localStorage.setItem('nsh_hr_v3',JSON.stringify(S));}
  d_('pMonth').value=VIEW.month;
  document.querySelectorAll('#segP button').forEach(b=>b.addEventListener('click',()=>{VIEW.period=b.dataset.p;document.querySelectorAll('#segP button').forEach(x=>x.classList.toggle('on',x===b));renderAll();}));
  d_('pMonth').addEventListener('change',()=>{VIEW.month=d_('pMonth').value;renderAll();});
  document.querySelectorAll('#tabs button').forEach(b=>b.addEventListener('click',()=>switchTab(b.dataset.t)));
  document.querySelectorAll('#langSeg button').forEach(b=>b.classList.toggle('on',b.dataset.l===LANG));
  applyStaticLang();
  renderAll();
  enforceInitialLock();
}
if(sessionStorage.getItem('nsh_ok')==='1'){document.getElementById('lock').style.display='none';document.getElementById('app').style.display='flex';boot();}
</script>
